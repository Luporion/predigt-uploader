# Beispielkonfiguration für PredigtUploader
# Kopiere diese Datei später nach config.toml oder nach %APPDATA%\PredigtUploader\config.toml

[paths]
# Beispiel: Auf Zielrechnern ist ein UNC-Pfad oft robuster als ein gemapptes Laufwerk.
# vmix_storage = "\\\\SERVER\\Freigabe\\vMixStorage"
vmix_storage = "V:\\vMixStorage"
recordings_base = "C:\\Users\\DEIN-NAME\\Desktop\\Aufnahmen"
cut_mp4_folder = ""
mp3_base = "V:\\Predigten\\Predigten"
ffmpeg_path = "ffmpeg"
losslesscut_path = ""

[naming]
predigt_template = "Predigt ({title}_{bible_reference})_{speaker}{extension}"
bibelstunde_template = "Bibelstunde ({title_bible_reference})_{speaker}{extension}"
vortrag_template = "Vortrag ({title})_{speaker}{extension}"
lobpreis_template = "Lobpreis ({title}){speaker_suffix}{extension}"
sonstiges_template = "{service_type} ({title}){speaker_suffix}{extension}"
folder_suffix_separator = " - "
year_folder_template = "{year}"

[workflow]
copy_instead_of_move = true
open_target_folder = true
raw_archive_mode = "move"

[service_types]
# Zusätzliche Dienstarten für die lokale Benutzer-Config.
# Format je Eintrag: "Name|Titel nötig|Bibelstelle nötig|Redner/Name nötig"
additional = []
